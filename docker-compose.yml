# ============================================
# 사용법:
#   빌드 및 실행: docker-compose up -d --build
#   로그 보기:   docker-compose logs -f
#   중지:       docker-compose down
# ============================================

# Docker Compose 파일 형식 버전 (3.8 = Docker Compose 3.8 버전 기능/문법 버전)
version: "3.8"

# 실행할 컨테이너(서비스) 목록 정의
services:
  # ----------------------------------------
  # Spring Boot 애플리케이션 서비스
  # logback: 애플리케이션 이름
  # ----------------------------------------
  # MySQL 데이터베이스
  mysql:
    image: mysql:8.0
    container_name: onharu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 9090
      MYSQL_DATABASE: onharu
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - onharu-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p9090"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --init-connect=SET NAMES utf8mb4
      - --character-set-client-handshake=FALSE

  minio:
    image: minio/minio:latest
    container_name: onharu-minio
    restart: unless-stopped
    environment:
      # MinIO 관리자 계정 설정
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: Password123
      # 브라우저 관리도구 접속용 (9001 포트 대응)
      MINIO_BROWSER_REDIRECT_URL: https://onharu-api-v2.votex.co.kr:9001
      # 실제 파일 업로드/다운로드 및 URL 생성용 (9000 포트 대응)
      MINIO_SERVER_URL: https://onharu-api-v2.votex.co.kr:9000
      # 기본 값은 파일 참조 기능이 활성화되어 있어 참조 OFF
      # MINIO_ROOT_USER_FILE: ""
      # MINIO_ROOT_PASSWORD_FILE: ""
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /mnt/data:/data
      - /etc/letsencrypt/live/onharu-api-v2.votex.co.kr/fullchain.pem:/root/.minio/certs/public.crt:ro
      - /etc/letsencrypt/live/onharu-api-v2.votex.co.kr/privkey.pem:/root/.minio/certs/private.key:ro

    command: server /data --address ":9000" --console-address ":9001"
    networks:
      - onharu-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 200M

  # ----------------------------------------
  # SonarQube (코드 품질·보안 분석)
  # ----------------------------------------
  sonarqube:
    image: sonarqube:lts-community
    container_name: onharu-sonarqube
    restart: unless-stopped
    ports:
      - "9002:9000"
    environment:
      # 로컬 개발 시 ES 부트스트랩 검사 완화 (Linux Docker Desktop 등)
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - onharu-network
    healthcheck:
      # SonarQube 기동까지 1~2분 걸릴 수 있음
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2048M

  # RabbitMQ (채팅 이벤트 큐 등 — 호스트 앱: RABBITMQ_HOST=localhost, compose 내부 WAS: rabbitmq)
  # 관리 UI: http://localhost:15672  (기본 계정 onharu / onharu — application-rabbitmq.yaml 과 동일)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: onharu-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613" # STOMP 플러그인 — Spring StompBrokerRelay 가 브로커와 통신할 때 사용 (기본 61613)
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-onharu}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-onharu}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
    networks:
      - onharu-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  # Redis (최근 검색어 등 — 로컬/도커 WAS에서 REDIS_HOST 로 연결)
  redis:
    image: redis:7-alpine
    container_name: onharu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - onharu-network

  # ----------------------------------------
  # Apache Kafka (coupon-issue-v3 / docker-compose.kafka.yaml 과 동일 스택)
  # 호스트에서 앱 실행 시: KAFKA_BOOTSTRAP_SERVERS=localhost:9092
  # 같은 compose 네트워크의 컨테이너에서 접속 시: kafka:29092
  # ----------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: onharu-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - onharu-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: onharu-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - onharu-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: onharu-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8888:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: onharu-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - onharu-network

  # Elasticsearch 8 (가게 검색 인덱싱·벤치 — 로컬 단일 노드, 보안 비활성)
  # 호스트 앱: SPRING_ELASTICSEARCH_URIS=http://localhost:9200, ONHARU_ELASTICSEARCH_ENABLED=true
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: onharu-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - onharu-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1536M

  # Kibana (Elasticsearch UI)
  # 접속: http://localhost:5601
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: onharu-kibana
    restart: unless-stopped
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      SERVER_NAME: my-kibana
      SERVER_HOST: 0.0.0.0
      ELASTICSEARCH_HOSTS: '["http://elasticsearch:9200"]'
    networks:
      - onharu-network

  # ----------------------------------------
  # Jenkins CI (컨트롤러 Java 17 — jenkins/jenkins:lts-jdk17)
  # ----------------------------------------
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: onharu-jenkins
    restart: unless-stopped
    ports:
      - "8088:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - onharu-network
    environment:
      JAVA_OPTS: "-Xmx1536m -Xms512m"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/login"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2048M

  onharu:
    build:
      context: .
      dockerfile: Dockerfile
    image: onharu/onharu-app:latest
    container_name: onharu-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Seoul  # Time Zone: Asia/Seoul
      JAVA_TOOL_OPTIONS: "-XX:+UseContainerSupport -XX:MaxRAMPercentage=75.0 -Dfile.encoding=UTF-8"
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL}
      LOGGING_LEVEL_HIBERNATE_SQL: ${LOGGING_LEVEL_HIBERNATE_SQL}
      JPA_HIGHLIGHT_SQL: ${JPA_HIGHLIGHT_SQL}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL}
      MINIO_URL: ${MINIO_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_REGION: ${MINIO_REGION}
      MINIO_BUCKET: ${MINIO_BUCKET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      LOGGING_FILE_NAME: ${LOGGING_FILE_NAME}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_IS_SSL: ${SMTP_IS_SSL}
      SMTP_IS_TLS: ${SMTP_IS_TLS}
      NTS_API_SERVICE_KEY: ${NTS_API_SERVICE_KEY}
      SERVER_FRONT_URL: ${SERVER_FRONT_URL}
      SERVER_BACK_URL: ${SERVER_BACK_URL}
      SERVER_URL: ${SERVER_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      RABBITMQ_HOST: ${RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-onharu}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-onharu}
      ONHARU_RABBITMQ_ENABLED: ${ONHARU_RABBITMQ_ENABLED:-false}
      # RabbitMQ STOMP 플러그인 기동 후 true 로 두면 SimpleBroker 대신 브로커 릴레이 사용
      ONHARU_STOMP_RELAY_ENABLED: ${ONHARU_STOMP_RELAY_ENABLED:-false}
      RABBITMQ_STOMP_HOST: ${RABBITMQ_STOMP_HOST:-rabbitmq}
      RABBITMQ_STOMP_PORT: ${RABBITMQ_STOMP_PORT:-61613}

    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2048M
    networks:
      - onharu-network

networks:
  onharu-network: # 이 네트워크 안에 들어온 컨테이너들(MySQL, Redis, WAS 등)끼리는 서로 이름만 불러도 통신이 가능하게 합니다. (예: WAS에서 DB 접속할 때 IP 대신 mysql:3306으로 접속 가능)
    driver: bridge

volumes:
  mysql_data:
    driver: local
  minio_data:
    driver: local
  sonarqube_data:
    driver: local
  sonarqube_extensions:
    driver: local
  sonarqube_logs:
    driver: local
  jenkins_home:
    driver: local
  kafka_data:
    driver: local
  rabbitmq_data:
    driver: local
  elasticsearch_data:
    driver: local