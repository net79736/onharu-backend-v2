spring:
  datasource:
    url: jdbc:mysql://localhost:3306/onharu_test_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: onharu_test
    password: test1234

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true

  sql:
    init:
      mode: never

  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

logging:
  level:
    org.hibernate.sql: debug
    org.hibernate.type.descriptor.sql: trace

minio:
  url: http://localhost:9000
  access-key: test-access-key
  secret-key: test-secret-key
  bucket: test-bucket

SMTP_HOST: localhost
SMTP_PORT: 25
SMTP_USERNAME: test
SMTP_PASSWORD: test
