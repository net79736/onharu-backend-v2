spring:
  config:
    import:
      - application-smtp.yaml
      - application-oauth.yaml
      - application-nts.yaml
  application:
    name: onharu
    is-secure: false
    front-domain: localhost

  # 데이터소스 설정
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  # JPA 설정
  jpa:
    show-sql: ${JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: ${JPA_FORMAT_SQL}
        highlight_sql: ${JPA_HIGHLIGHT_SQL}

  # Redis (최근 검색어 — 미기동 시 앱 기동 실패, 예: docker run -d -p 6379:6379 redis:7-alpine)
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

# MinIO 설정 (로컬 개발용)
minio:
  url: ${MINIO_URL:https://onharu-api-v2.votex.co.kr/minio}
  access-key: ${MINIO_ACCESS_KEY:admin}
  secret-key: ${MINIO_SECRET_KEY:Password123}
  region: ${MINIO_REGION:us-east-1}
  bucket: ${MINIO_BUCKET:onharu-minio}

# 가게 검색 기본 반경 설정
store:
  search:
    default-radius-km: 20  # 기본 반경 20km
    recent-keywords:
      max-items: 10 # 최근 검색어 최대 개수
      max-keyword-length: 30 # 최근 검색어 최대 길이
      ttl-seconds: 30 # 최근 검색어 유지 시간

# 서버 설정
server:
  port: 8080

# 로깅 설정
logging:
  level:
    root: INFO
    com.backend.onharu: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: ${LOGGING_LEVEL_HIBERNATE_SQL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOGGING_FILE_NAME:/app/logs/onharu.log}
    max-size: 10MB
    max-history: 30