<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>온하루 임시 비밀번호</title>
</head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9;padding:48px 16px;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:12px;overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,0.08);">
                <tr>
                    <td style="padding:32px 32px 16px;">
                        <div style="width:48px;height:48px;background:#4f46e5;border-radius:12px;text-align:center;line-height:48px;color:#fff;font-size:22px;font-weight:800;">온</div>
                        <p style="margin:16px 0 0;color:#312e81;font-size:18px;font-weight:700;">온하루</p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:8px 32px;">
                        <h1 style="margin:0 0 8px;font-size:22px;font-weight:800;color:#0f172a;">임시 비밀번호 안내</h1>
                        <p style="margin:0;font-size:14px;line-height:1.6;color:#334155;">
                            요청하신 계정(<span th:text="${email}">login@example.com</span>)의 임시 비밀번호입니다.<br/>
                            로그인 후 반드시 비밀번호를 변경해 주세요.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:16px 32px 32px;">
                        <div style="background:#eef2ff;border:2px solid #4f46e5;border-radius:10px;padding:16px;">
                            <p style="margin:0 0 6px;font-size:13px;font-weight:600;color:#475569;">임시 비밀번호</p>
                            <p th:text="${tempPassword}"
                               style="margin:0;font-size:16px;font-weight:700;color:#3730a3;word-break:break-all;font-family:ui-monospace,Menlo,Consolas,monospace;">temp</p>
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
