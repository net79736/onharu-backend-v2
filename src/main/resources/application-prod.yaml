spring:
  config:
    activate:
      on-profile: prod
  application:
    name: onharu
  
  # 데이터소스 설정 (프로덕션 환경)
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  # JPA 설정
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate                # 프로덕션에서는 validate 사용
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: false
        highlight_sql: false
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true

# 서버 설정
server:
  port: ${SERVER_PORT}

# 로깅 설정
logging:
  level:
    root: INFO
    com.backend.onharu: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: false
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOGGING_FILE_NAME}
    max-size: 10MB
    max-history: 30
