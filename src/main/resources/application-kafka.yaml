# Kafka — dev 프로필에서만 import (coupon-issue-v3 / movie 와 동일한 키 구조)
# 브로커 없이 앱만 띄우려면: onharu.kafka.enabled=false 또는 환경변수 ONHARU_KAFKA_ENABLED=false
onharu:
  kafka:
    enabled: ${ONHARU_KAFKA_ENABLED:false}

spring:
  kafka:
    template:
      default-topic: onharu-chat
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    properties:
      retry.backoff.ms: 5000
      request.timeout.ms: 30000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:onharu-group}
      enable-auto-commit: true
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    listener:
      auto-startup: ${KAFKA_LISTENER_AUTO_STARTUP:true}
