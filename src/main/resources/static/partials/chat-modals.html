<!-- 채팅 UI 조각 — index.html 에서 fetch 후 #onharu-chat-modals-host 에 삽입 -->
<dialog id="chatModal" class="booking-modal w-[min(96vw,960px)] max-w-full h-[min(90vh,720px)] rounded-2xl border border-slate-200 p-0 shadow-2xl">
  <div class="flex h-full min-h-0">
    <div id="chatListPane" class="w-72 shrink-0 flex flex-col border-r border-slate-200 bg-slate-50/95">
      <div class="flex items-center justify-between gap-2 border-b border-slate-200 px-4 py-3">
        <h3 class="text-base font-semibold text-slate-900">채팅</h3>
        <div class="flex items-center gap-1.5">
          <button type="button" id="btnNewChat" class="px-2.5 py-1 rounded-lg bg-emerald-700 text-white text-xs font-medium hover:bg-emerald-800">새 채팅</button>
          <button type="button" id="btnChatModalClose" class="px-2.5 py-1 rounded-lg border border-slate-300 bg-white text-xs text-slate-700 hover:bg-slate-50">닫기</button>
        </div>
      </div>
      <div id="chatRoomList" class="flex-1 overflow-y-auto overscroll-contain"></div>
    </div>
    <div id="chatRoomPane" class="flex-1 flex flex-col min-w-0 bg-white">
      <div id="chatEmpty" class="flex-1 flex items-center justify-center">
        <div class="text-center space-y-2">
          <div class="text-4xl">💬</div>
          <p class="text-sm text-slate-500">채팅방을 선택해 주세요</p>
        </div>
      </div>
      <div id="chatActive" class="hidden flex-1 flex flex-col min-h-0">
        <div id="chatHeader" class="flex items-center justify-between gap-3 border-b border-slate-200 px-4 py-3">
          <div class="flex items-center gap-2 min-w-0">
            <div class="w-8 h-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-800 text-sm font-bold shrink-0" id="chatHeaderAvatar">?</div>
            <span id="chatHeaderName" class="text-sm font-semibold text-slate-900 truncate">—</span>
          </div>
          <button type="button" id="btnLeaveChat" class="px-2.5 py-1 rounded-lg border border-rose-200 text-rose-700 text-xs hover:bg-rose-50">나가기</button>
        </div>
        <div id="chatMessages" class="flex-1 overflow-y-auto overscroll-contain px-4 py-3 space-y-1 bg-slate-50/50"></div>
        <div id="chatInputArea" class="border-t border-slate-200 px-4 py-3">
          <div class="flex items-end gap-2">
            <textarea id="chatInput" rows="1" placeholder="메시지를 입력하세요…" class="flex-1 resize-none rounded-xl border border-slate-300 px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 max-h-24 overflow-y-auto" disabled></textarea>
            <button type="button" id="btnChatSend" class="shrink-0 px-4 py-2 rounded-xl bg-emerald-700 text-white text-sm font-semibold hover:bg-emerald-800 disabled:opacity-40 disabled:cursor-not-allowed" disabled>전송</button>
          </div>
          <p id="chatConnStatus" class="text-[11px] text-slate-400 mt-1 hidden"></p>
        </div>
      </div>
    </div>
  </div>
</dialog>

<dialog id="newChatModal" class="booking-modal w-[min(90vw,400px)] rounded-2xl border border-slate-200 p-0 shadow-2xl">
  <div class="border-b border-emerald-100 bg-emerald-50/95 px-4 py-3 flex items-center justify-between">
    <h3 class="text-sm font-semibold text-emerald-900">새 채팅방 만들기</h3>
    <button type="button" id="btnNewChatClose" class="px-2.5 py-1 rounded-lg border border-slate-200 bg-white text-xs text-slate-700 hover:bg-slate-50">닫기</button>
  </div>
  <div class="px-4 py-4 space-y-3">
    <div class="relative">
      <label class="block text-xs font-medium text-slate-600 mb-1" for="newChatLoginSearch">상대방 (로그인 아이디 검색)</label>
      <input id="newChatLoginSearch" type="text" autocomplete="off" placeholder="이메일 일부를 입력하면 목록이 뜹니다"
        class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" />
      <div id="newChatSuggest" class="hidden absolute z-[60] left-0 right-0 mt-1 max-h-52 overflow-y-auto rounded-lg border border-slate-200 bg-white shadow-lg"></div>
      <input type="hidden" id="newChatTargetId" value="" />
      <p id="newChatSelected" class="hidden mt-2 text-xs text-emerald-800 rounded-lg border border-emerald-200 bg-emerald-50/90 px-2.5 py-1.5"></p>
    </div>
    <div>
      <label class="block text-xs font-medium text-slate-600 mb-1" for="newChatRoomName">채팅방 이름</label>
      <input id="newChatRoomName" type="text" placeholder="비우면 자동으로 제목이 붙습니다" class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500" />
    </div>
    <p class="text-[11px] text-slate-500 leading-relaxed">↑↓로 항목 이동, <strong class="text-slate-700">Enter</strong>로 선택 · 선택 후 <strong class="text-slate-700">채팅방 생성</strong>을 누르세요.</p>
    <button type="button" id="btnNewChatSubmit" class="w-full py-2.5 rounded-lg bg-emerald-700 text-white text-sm font-semibold hover:bg-emerald-800">채팅방 생성</button>
    <p id="newChatMsg" class="text-xs text-slate-500 min-h-[1rem]"></p>
  </div>
</dialog>
