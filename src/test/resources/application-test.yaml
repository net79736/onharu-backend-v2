spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:onharu-test;MODE=MYSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  mail:
    host: localhost
    port: 25
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-name: kakao
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: http://localhost:8080/login/oauth2/code/kakao
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - account_email
              - name
              - phone_number
        provider:
          kakao:
            user-name-attribute: id
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me

minio:
  url: ${MINIO_URL:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  region: ${MINIO_REGION:us-east-1}
  bucket: ${MINIO_BUCKET:onharu-minio-test} # 테스트용 버킷 이름 분리 권장

logging:
  level:
    root: WARN
    com.backend.onharu: DEBUG

# SMTP (메일 발송 테스트용 - 필요 시 @Value 등으로 주입)
SMTP_HOST: localhost
SMTP_PORT: 25
SMTP_USERNAME: test
SMTP_PASSWORD: test

# 국세청 API 호출 테스트용
external:
  nts:
    base-url: https://api.odcloud.kr/api/nts-businessman/v1/status
    serviceKey: test
    connect-timeout: 5000
    read-timeout: 5000
